<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandadex | Registro Repartidor</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111827;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container{

     width:100%;

    max-width:460px;

    padding:28px;

    border-radius:25px;

    background:transparent;

    box-shadow:none;

    transition:.4s;


}

    .container-final{

    background:#1f2937;

    border:1px solid rgba(255,255,255,.04);

    box-shadow:
    0 0 35px rgba(0,0,0,.35);

}
.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#2563eb;
    font-size:36px;
}

.logo p{
    color:#9ca3af;
    margin-top:5px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#d1d5db;
    font-size:14px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#374151;
    color:white;
    outline:none;
    font-size:15px;
}

input::placeholder{
    color:#9ca3af;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#ff5a1f;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
    margin-top:10px;
}

.btn:hover{
    background:#3b82f6;
}

.loading-screen,
.avatar-screen,
.badge-screen{
    display:none;
    text-align:center;
}

.loader{
    width:85px;
    height:85px;
    border:8px solid #374151;
    border-top:8px solid #ff5a1f;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:30px auto;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.avatar-grid,
.moto-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin:20px 0;
}

.avatar,
.moto{
    width:60px;
    height:60px;
    border-radius:16px;
    background:#374151;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    cursor:pointer;
    border:3px solid transparent;
    transition:.2s;
}

.selected{
    border:3px solid #ff5a1f;
    transform:scale(1.05);
}

.badge{

     width:100%;

    max-width:390px;

    margin:20px auto;

    padding:45px 22px;
    background:linear-gradient(145deg,#2563eb,#1e40af);
    border-radius:35px;
   
    color:white;
    
    box-shadow:
    0 20px 50px rgba(0,0,0,.45),
    inset 0 1px 1px rgba(255,255,255,.15);

    position:relative;
    overflow:hidden;

    border:1px solid rgba(255,255,255,.08);
}
.badge::before{
    content:"";
    position:absolute;
    top:-90px;
    right:-90px;
    width:240px;
    height:240px;
    background:rgba(255,255,255,.06);
    border-radius:50%;
}

.badge::after{
    content:"";
    position:absolute;
    bottom:-70px;
    left:-70px;
    width:180px;
    height:180px;
    background:rgba(255,255,255,.05);
    border-radius:50%;
}

.badge-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.mandadex-logo{
    font-size:28px;
    font-weight:bold;
    letter-spacing:3px;
}

.badge-status{
    background:#22c55e;
    padding:8px 15px;
    border-radius:30px;
    font-size:12px;
    font-weight:bold;
    box-shadow:0 0 15px rgba(34,197,94,.4);
}

.badge-avatar{
    width:130px;
    height:130px;
    border-radius:50%;
    background:white;
    color:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:65px;
    margin:0 auto 18px;

    border:6px solid rgba(255,255,255,.25);

    box-shadow:
    0 10px 25px rgba(0,0,0,.25),
    inset 0 2px 5px rgba(255,255,255,.4);
}

.badge h2{
    text-align:center;
    font-size:30px;
    margin-bottom:8px;
    font-weight:bold;
}

.badge-role{
    text-align:center;
    opacity:.9;
    margin-bottom:25px;
    font-size:15px;
    letter-spacing:1px;
}

.badge-divider{
    width:100%;
    height:1px;
    background:rgba(255,255,255,.2);
    margin:25px 0;
}

.info-box{
    background:rgba(255,255,255,.10);
    padding:20px;
    border-radius:22px;
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.08);
}

.label{
    display:block;
    font-size:13px;
    opacity:.8;
    margin-bottom:10px;
    letter-spacing:1px;
}

.moto-section{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:18px;
    font-weight:bold;
}

.moto-icon{
    font-size:38px;
}

.badge-id{
    margin-top:28px;
    background:#0f172a;
    padding:16px;
    border-radius:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    letter-spacing:4px;

    border:1px solid rgba(255,255,255,.08);

    box-shadow:inset 0 1px 2px rgba(255,255,255,.08);
}

   @media(max-width:600px){

    .container{

        max-width:100%;

        padding:14px;

    }

    .badge{

        max-width:100%;

        width:100%;

        padding:50px 24px;

        border-radius:38px;

    }

}
</style>
</head>

<body>

<div class="container">

    <!-- FORMULARIO -->

    <div id="formScreen">

        <div class="logo">
            <h1>Mandadex</h1>
            <p>Registro de Repartidores</p>
        </div>

        <form id="registroForm">

            <div class="form-group">
                <label>Nombre completo</label>

                <input
                    type="text"
                    id="nombre"
                    placeholder="Ingresa tu nombre"
                    required
                >
            </div>

            <div class="form-group">
                <label>Teléfono</label>

                <input
                    type="tel"
                    id="telefono"
                    placeholder="333 000 0000"
                    required
                >
            </div>

            <div class="form-group">
                <label>Correo electrónico</label>

                <input
                    type="email"
                    id="correo"
                    placeholder="correo@gmail.com"
                    required
                >
            </div>

            <div class="form-group">
                <label>Modelo de motocicleta</label>

                <input
                    type="text"
                    id="motoModelo"
                    placeholder="Ejemplo: Italika FT150"
                    required
                >
            </div>

            <button type="submit" class="btn">
                Registrarme
            </button>

        </form>

    </div>

    <!-- CARGANDO -->

    <div class="loading-screen" id="loadingScreen">

        <div class="loader"></div>

        <h2>Registrando...</h2>

        <p style="margin-top:10px;color:#9ca3af;">
            Preparando tu gafete digital
        </p>

    </div>

    <!-- AVATAR -->

    <div class="avatar-screen" id="avatarScreen">

        <h2>Todo listo ✅</h2>

        <p style="margin-top:10px;color:#9ca3af;">
            Elige tu avatar y motocicleta
        </p>

        <h3 style="margin-top:25px;">Avatar</h3>

        <div class="avatar-grid">

            <div class="avatar">🧑</div>
            <div class="avatar">👨</div>
            <div class="avatar">😎</div>
            <div class="avatar">🧔</div>
            <div class="avatar">👨‍🚀</div>

        </div>

        <h3 style="margin-top:20px;">Motocicleta</h3>

        <div class="moto-grid">

            <div class="moto">🏍️</div>
            <div class="moto">🛵</div>
            <div class="moto">🏍</div>
            <div class="moto">🛵</div>
            <div class="moto">🏍️</div>

        </div>

        <button class="btn" id="confirmarBtn">
            Confirmar
        </button>

    </div>

    <!-- GAFETE -->

    <div class="badge-screen" id="badgeScreen">

        <div class="badge">

            <div class="badge-top">

                <div class="mandadex-logo">
                    MDX
                </div>

                <div class="badge-status">
                    ACTIVO
                </div>

            </div>

            <div class="badge-avatar" id="badgeAvatar">
                🧑
            </div>

            <h2 id="badgeNombre">
                Nombre
            </h2>

            <p class="badge-role">
                Repartidor Oficial
            </p>

            <div class="badge-divider"></div>

            <div class="info-box">

                <span class="label">
                    Motocicleta
                </span>

                <div class="moto-section">

                    <span class="moto-icon" id="badgeMoto">
                        🏍️
                    </span>

                    <span id="badgeModelo">
                        Italika FT150
                    </span>

                </div>

            </div>

            <div class="badge-id" id="badgeId">
                MDX-0001
            </div>

        </div>

    </div>

</div>

<script>

const SUPABASE_URL = "https://fatwbryclojwzmfjkwmy.supabase.co";

const SUPABASE_KEY = "sb_publishable_GxtunauXouOznIIpfX3RPw_th3eOiAG";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);
    
const form = document.getElementById("registroForm");

const formScreen = document.getElementById("formScreen");
const loadingScreen = document.getElementById("loadingScreen");
const avatarScreen = document.getElementById("avatarScreen");
const badgeScreen = document.getElementById("badgeScreen");

const avatars = document.querySelectorAll(".avatar");
const motos = document.querySelectorAll(".moto");

    document.querySelector(".container")
.classList.add("container-final");

let selectedAvatar = "🧑";
let selectedMoto = "🏍️";

let nombreGlobal = "";
let motoGlobal = "";

avatars.forEach(avatar => {

    avatar.addEventListener("click", ()=>{

        avatars.forEach(a => a.classList.remove("selected"));

        avatar.classList.add("selected");

        selectedAvatar = avatar.textContent;

    });

});

motos.forEach(moto => {

    moto.addEventListener("click", ()=>{

        motos.forEach(m => m.classList.remove("selected"));

        moto.classList.add("selected");

        selectedMoto = moto.textContent;

    });

});

form.addEventListener("submit", function(e){

    e.preventDefault();

    nombreGlobal = document.getElementById("nombre").value;

    motoGlobal = document.getElementById("motoModelo").value;

    formScreen.style.display = "none";

    loadingScreen.style.display = "block";

    setTimeout(()=>{

        loadingScreen.style.display = "none";

        avatarScreen.style.display = "block";

    },2500);

});

document.getElementById("confirmarBtn").addEventListener("click", async ()=>{

    avatarScreen.style.display = "none";

    badgeScreen.style.display = "block";

    document.querySelector(".container")
.classList.add("container-final");

    document.getElementById("badgeAvatar").textContent = selectedAvatar;

    document.getElementById("badgeMoto").textContent = selectedMoto;

    document.getElementById("badgeNombre").textContent = nombreGlobal;

    document.getElementById("badgeModelo").textContent = motoGlobal;

    const randomID = "MDX-" + Math.floor(1000 + Math.random() * 9000);

    document.getElementById("badgeId").textContent = randomID;

    // AQUI SE GUARDARA EN LA BASE DE DATOS

    const datos = {

        nombre: nombreGlobal,
        telefono: document.getElementById("telefono").value,
        correo: document.getElementById("correo").value,
        motocicleta: motoGlobal,
        avatar: selectedAvatar,
        moto_icono: selectedMoto,
        repartidor_id: randomID

    };

    const { error } = await supabaseClient
.from("repartidores")
.insert([datos]);

if(error){

    alert("ERROR: " + error.message);

    console.log(error);

}else{

    alert("REGISTRO GUARDADO");

    console.log("Registro guardado correctamente");

}

});

</script>

</body>
</html>
