<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandadex | Registro Repartidor</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111827;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container{
    width:100%;
    max-width:460px;
    background:#1f2937;
    padding:28px;
    border-radius:30px;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

.hide-container{
    background:transparent !important;
    box-shadow:none !important;
    border:none !important;
}

.container-final{
    background:#1f2937;
    border:1px solid rgba(255,255,255,.04);
    box-shadow:0 0 35px rgba(0,0,0,.35);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#2563eb;
    font-size:36px;
}

.logo p{
    color:#9ca3af;
    margin-top:5px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#d1d5db;
    font-size:14px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#374151;
    color:white;
    outline:none;
    font-size:15px;
}

input::placeholder{
    color:#9ca3af;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#ff5a1f;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
    margin-top:15px;
}

.btn:hover{
    background:#3b82f6;
}

.loading-screen,
.avatar-screen,
.badge-screen{
    display:none;
    text-align:center;
}

.loader{
    width:85px;
    height:85px;
    border:8px solid #374151;
    border-top:8px solid #ff5a1f;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:30px auto;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.avatar-grid,
.moto-grid,
.color-grid{

    display:grid;
    justify-content:center;
    gap:12px;
    margin:20px 0;

}

.avatar-grid,
.moto-grid{
    grid-template-columns:repeat(5,60px);
}

.color-grid{
 grid-template-columns:repeat(5,55px);
}

/* ========================= */
/* AVATARES */
/* ========================= */

.avatar{

    width:60px;
    height:60px;

    border-radius:16px;

    background:#374151;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:28px;

    cursor:pointer;

    border:3px solid transparent;

    transition:.2s;

}

/* ========================= */
/* MOTOS */
/* ========================= */

.moto-grid{

    display:grid;

    grid-template-columns:repeat(5,60px);

    justify-content:center;

    gap:10px;

    margin:20px 0;

}

.moto{

    width:60px;
    height:60px;

    border-radius:16px;

    background:#374151;

    overflow:hidden;

    position:relative;

    cursor:pointer;

    border:3px solid transparent;

    transition:.2s;

}

/* IMAGEN GENERAL */

.moto-img{

    position:absolute;

    width:420px;

    max-width:none;

}

/* MOTONETA */

.motoneta{

    left:-5px;
    top:-5px;

}

/* DEPORTIVA */

.deportiva{

    left:-495px;
    top:-5px;

}

/* NAKED */

.naked{

    left:-980px;
    top:-5px;

}

/* DOBLE */

.doble{

    left:-120px;
    top:-350px;

}

/* CARGO */

.cargo{

    left:-720px;
    top:-350px;

}

/* ========================= */
/* COLORES */
/* ========================= */

.color-grid{

    display:grid;

    grid-template-columns:repeat(5,45px);

    justify-content:center;

    gap:10px;

    margin:20px 0;

}

.color-option{

    width:45px;
    height:45px;

    border-radius:14px;

    cursor:pointer;

    border:3px solid transparent;

    transition:.2s;

}

/* ========================= */
/* SELECCIONADO */
/* ========================= */

.selected{

    border:3px solid #ffffff;

    transform:scale(1.08);

}

/* ========================= */
/* BADGE */
/* ========================= */

.moto-section{

    display:flex;

    align-items:center;

    gap:12px;

    font-size:18px;

    font-weight:bold;

}

#badgeMotoContainer{

    width:95px;
    height:60px;

    overflow:hidden;

    position:relative;

    flex-shrink:0;

}

#badgeMoto{

    position:absolute;

    width:420px;

}

.badge-id{
    margin-top:28px;
    background:#0f172a;
    padding:16px;
    border-radius:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    letter-spacing:4px;
}

@media(max-width:600px){

    .container{
        max-width:100%;
        padding:14px;
    }

    .badge{
        max-width:100%;
        width:100%;
        padding:50px 24px;
    }

}

</style>
</head>

<body>

<div class="container">

<!-- FORMULARIO -->

<div id="formScreen">

    <div class="logo">
        <h1>Mandadex</h1>
        <p>Registro de Repartidores</p>
    </div>

    <form id="registroForm">

        <div class="form-group">
            <label>Nombre completo</label>

            <input
                type="text"
                id="nombre"
                placeholder="Ingresa tu nombre"
                required
            >
        </div>

        <div class="form-group">
            <label>Teléfono</label>

            <input
                type="tel"
                id="telefono"
                placeholder="333 000 0000"
                required
            >
        </div>

        <div class="form-group">
            <label>Correo electrónico</label>

            <input
                type="email"
                id="correo"
                placeholder="correo@gmail.com"
                required
            >
        </div>

        <div class="form-group">
            <label>Modelo de motocicleta</label>

            <input
                type="text"
                id="motoModelo"
                placeholder="Ejemplo: Italika FT150"
                required
            >
        </div>

        <button type="submit" class="btn">
            Registrarme
        </button>

    </form>

</div>

<!-- CARGANDO -->

<div class="loading-screen" id="loadingScreen">

    <div class="loader"></div>

    <h2 id="loadingTitle">Registrando...</h2>

    <p id="loadingText" style="margin-top:10px;color:#9ca3af;">
        Preparando tu perfil
    </p>

</div>

<!-- AVATAR -->

<div class="avatar-screen" id="avatarScreen">

    <h2>Todo listo ✅</h2>

    <p style="margin-top:10px;color:#9ca3af;">
        Personaliza tu gafete
    </p>

    <h3 style="margin-top:25px;">Avatar</h3>

    <div class="avatar-grid">

        <div class="avatar">🧑</div>
        <div class="avatar">👨</div>
        <div class="avatar">😎</div>
        <div class="avatar">🧔</div>
        <div class="avatar">👨‍🚀</div>

    </div>

    <h3 style="margin-top:20px;">Motocicleta</h3>

<div class="moto-grid">

    <!-- MOTONETA -->
    <div class="moto selected" data-moto="motoneta">

        <img
            src="assets/motos/motos.png"
            class="moto-img motoneta"
        >

    </div>

    <!-- DEPORTIVA -->
    <div class="moto" data-moto="deportiva">

        <img
            src="assets/motos/motos.png"
            class="moto-img deportiva"
        >

    </div>

    <!-- NAKED -->
    <div class="moto" data-moto="naked">

        <img
            src="assets/motos/motos.png"
            class="moto-img naked"
        >

    </div>

    <!-- DOBLE -->
    <div class="moto" data-moto="doble">

        <img
            src="assets/motos/motos.png"
            class="moto-img doble"
        >

    </div>

    <!-- CARGO -->
    <div class="moto" data-moto="cargo">

        <img
            src="assets/motos/motos.png"
            class="moto-img cargo"
        >

    </div>

</div>

    <h3 style="margin-top:20px;">Color</h3>

  <div class="color-grid">

    <!-- Azul -->
    <div 
        class="color-option"
        data-gradient="linear-gradient(145deg,#2563eb,#1e40af)"
        style="background:linear-gradient(145deg,#2563eb,#1e40af);">
    </div>

    <!-- Naranja -->
    <div 
        class="color-option"
        data-gradient="linear-gradient(145deg,#ff5a1f,#ea580c)"
        style="background:linear-gradient(145deg,#ff5a1f,#ea580c);">
    </div>

    <!-- Negro -->
    <div 
        class="color-option"
        data-gradient="linear-gradient(145deg,#111827,#000000)"
        style="background:linear-gradient(145deg,#111827,#000000);">
    </div>

    <!-- Morado fuerte -->
    <div 
        class="color-option"
        data-gradient="linear-gradient(145deg,#7e22ce,#581c87)"
        style="background:linear-gradient(145deg,#7e22ce,#581c87);">
    </div>

    <!-- Verde oscuro -->
    <div 
        class="color-option"
        data-gradient="linear-gradient(145deg,#15803d,#14532d)"
        style="background:linear-gradient(145deg,#15803d,#14532d);">
    </div>

</div>
    <button class="btn" id="confirmarBtn">
        Confirmar
    </button>

</div>

<!-- GAFETE -->

<div class="badge-screen" id="badgeScreen">

    <div class="badge" id="badgeCard">

        <div class="badge-top">

            <div class="mandadex-logo">
                MDX
            </div>

            <div class="badge-status">
                ACTIVO
            </div>

        </div>

        <div class="badge-avatar" id="badgeAvatar">
            🧑
        </div>

        <h2 id="badgeNombre">
            Nombre
        </h2>

        <p class="badge-role">
            Repartidor Oficial
        </p>

        <div class="badge-divider"></div>

        <div class="info-box">

            <span class="label">
                Motocicleta
            </span>

            <div class="moto-section">

             <div id="badgeMotoContainer">

    <img
        id="badgeMoto"
        src="assets/motos/motos.png"
    >

</div>

                <span id="badgeModelo">
                    Italika FT150
                </span>

            </div>

        </div>

        <div class="badge-id" id="badgeId">
            MDX-0001
        </div>

    </div>

</div>

</div>

<script>

const SUPABASE_URL = "https://fatwbryclojwzmfjkwmy.supabase.co";

const SUPABASE_KEY = "sb_publishable_GxtunauXouOznIIpfX3RPw_th3eOiAG";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const form = document.getElementById("registroForm");

const formScreen = document.getElementById("formScreen");
const loadingScreen = document.getElementById("loadingScreen");
const avatarScreen = document.getElementById("avatarScreen");
const badgeScreen = document.getElementById("badgeScreen");

const avatars = document.querySelectorAll(".avatar");
const motos = document.querySelectorAll(".moto");
const colorOptions = document.querySelectorAll(".color-option");

document.querySelector(".container")
.classList.add("container-final");

let selectedAvatar = "🧑";
let selectedMoto = "motoneta";

let selectedGradient =
"linear-gradient(145deg,#2563eb,#1e40af)";

let nombreGlobal = "";
let motoGlobal = "";

avatars.forEach(avatar => {

    avatar.addEventListener("click", ()=>{

        avatars.forEach(a => a.classList.remove("selected"));

        avatar.classList.add("selected");

        selectedAvatar = avatar.textContent;

    });

});

motos.forEach(moto => {

    moto.addEventListener("click", ()=>{

        motos.forEach(m => m.classList.remove("selected"));

        moto.classList.add("selected");

     selectedMoto = moto.dataset.moto;

    });

});

colorOptions.forEach(color => {

    color.addEventListener("click", ()=>{

        colorOptions.forEach(c => c.classList.remove("selected"));

        color.classList.add("selected");

        selectedGradient = color.dataset.gradient;

    });

});

form.addEventListener("submit", function(e){

    e.preventDefault();

    nombreGlobal = document.getElementById("nombre").value;

    motoGlobal = document.getElementById("motoModelo").value;

    formScreen.style.display = "none";

    loadingScreen.style.display = "block";

    document.getElementById("loadingTitle").textContent =
    "Registrando...";

    document.getElementById("loadingText").textContent =
    "Preparando tu perfil";

    document.querySelector(".container")
    .classList.add("hide-container");

    setTimeout(()=>{

        loadingScreen.style.display = "none";

        avatarScreen.style.display = "block";

    },2000);

});

document.getElementById("confirmarBtn")
.addEventListener("click", async ()=>{

    avatarScreen.style.display = "none";

    loadingScreen.style.display = "block";

    document.getElementById("loadingTitle").textContent =
    "Generando gafete...";

    document.getElementById("loadingText").textContent =
    "Personalizando tu identificación digital";

    const randomID =
    "MDX-" + Math.floor(1000 + Math.random() * 9000);

    const datos = {

        nombre: nombreGlobal,
        telefono: document.getElementById("telefono").value,
        correo: document.getElementById("correo").value,
        motocicleta: motoGlobal,
        avatar: selectedAvatar,
        moto_icono: selectedMoto,
        repartidor_id: randomID,
        color_gafete: selectedGradient

    };

    const { error } = await supabaseClient
    .from("repartidores")
    .insert([datos]);

    setTimeout(()=>{

        loadingScreen.style.display = "none";

        badgeScreen.style.display = "block";

        document.querySelector(".container")
        .classList.remove("hide-container");

        document.getElementById("badgeCard")
        .style.background = selectedGradient;

        document.getElementById("badgeAvatar")
        .textContent = selectedAvatar;

      const badgeMoto =
document.getElementById("badgeMoto");

if(selectedMoto === "motoneta"){

    badgeMoto.style.left = "-10px";
    badgeMoto.style.top = "-10px";

}

if(selectedMoto === "deportiva"){

    badgeMoto.style.left = "-610px";
    badgeMoto.style.top = "-10px";

}

if(selectedMoto === "naked"){

    badgeMoto.style.left = "-1190px";
    badgeMoto.style.top = "-10px";

}

if(selectedMoto === "doble"){

    badgeMoto.style.left = "-160px";
    badgeMoto.style.top = "-430px";

}

if(selectedMoto === "cargo"){

    badgeMoto.style.left = "-860px";
    badgeMoto.style.top = "-430px";

}

        document.getElementById("badgeNombre")
        .textContent = nombreGlobal;

        document.getElementById("badgeModelo")
        .textContent = motoGlobal;

        document.getElementById("badgeId")
        .textContent = randomID;

    },1500);

    if(error){

        alert("ERROR: " + error.message);

        console.log(error);

    }else{

        console.log("Registro guardado correctamente");

    }

});

</script>

</body>
</html>
